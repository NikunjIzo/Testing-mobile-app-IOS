name: iOS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install
          cd ..

      - name: Build iOS App
        run: |
          cd ios
          xcodebuild -workspace MyIOSApp.xcworkspace \
          -scheme MyIOSApp \
          -configuration Release \
          -sdk iphoneos \
          build